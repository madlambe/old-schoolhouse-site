<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Old Schoolhouse | Luxury Holiday Let South Wales</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO -->
  <meta name="description" content="The Old Schoolhouse is a luxury countryside holiday house in South Wales, designed for refined family and group stays. Bookings opening soon.">

  <!-- Open Graph -->
  <meta property="og:title" content="The Old Schoolhouse">
  <meta property="og:description" content="A refined countryside house in South Wales. Bookings opening soon.">
  <meta property="og:image" content="hero.jpg">
  <meta property="og:type" content="website">

  <style>
    body {
      margin: 0;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: #231f20;
      background-color: #ffffff;
    }

    .hero {
      height: 100vh;
      background-image: url('hero.jpg');
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .overlay {
      background: rgba(255,255,255,0.85);
      padding: 60px;
      border-radius: 16px;
      text-align: center;
      max-width: 600px;
    }

    /* BOOKINGS TEXT */
    .coming {
      font-family: "Trajan", serif;
      font-size: 30px;
      letter-spacing: 1px;
      color: #23447c;
      font-weight: 700;
      margin-bottom: 15px;
    }

    /* SUBTEXT */
    .subtext {
      font-size: 16px;
      color: #231f20;
      margin-bottom: 25px;
    }

    p {
      font-size: 18px;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .buttons {
      margin-top: 10px;
    }

    /* BUTTON BASE */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 22px;
      margin: 6px;
      border-radius: 10px;
      text-decoration: none;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; /* MATCH BODY */
      font-size: 14px;
      letter-spacing: 0.5px;
      color: #ffffff;
      transition: all 0.3s ease;
    }

    /* INSTAGRAM */
    .btn.instagram {
      background-color: #b56474;
    }

    .btn.instagram:hover {
      opacity: 0.85;
    }

    /* FACEBOOK */
    .btn.facebook {
      background-color: #4d89a9;
    }

    .btn.facebook:hover {
      opacity: 0.85;
    }

    img.logo {
      max-width: 200px;
      margin-bottom: 25px;
    }

  </style>
</head>

<body>

  <div class="hero">

    <div class="overlay">

      <!-- LOGO -->
      <img src="logo.png" class="logo" alt="The Old Schoolhouse">

      <p>
        A private countryside house in South Wales<br>
        designed for refined stays.
      </p>

      <div class="coming">
        Bookings Opening Soon
      </div>

      <div class="subtext">
        Follow us for updates
      </div>

      <div class="buttons">

        <a href="https://www.instagram.com/the_old_schoolhouse_wales" target="_blank" class="btn instagram">
          <!-- Instagram Icon -->
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 24 24">
            <path d="M7 2C4.2 2 2 4.2 2 7v10c0 2.8 2.2 5 5 5h10c2.8 0 5-2.2 5-5V7c0-2.8-2.2-5-5-5H7zm10 2c1.7 0 3 1.3 3 3v10c0 1.7-1.3 3-3 3H7c-1.7 0-3-1.3-3-3V7c0-1.7 1.3-3 3-3h10zm-5 3a5 5 0 100 10 5 5 0 000-10zm0 2a3 3 0 110 6 3 3 0 010-6zm4.8-.9a1.2 1.2 0 100 2.4 1.2 1.2 0 000-2.4z"/>
          </svg>
          Instagram
        </a>

        <a href="https://www.facebook.com/theoldschoolhouse1867" target="_blank" class="btn facebook">
          <!-- Facebook Icon -->
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 24 24">
            <path d="M22 12a10 10 0 10-11.6 9.9v-7h-2.4v-2.9h2.4V9.6c0-2.4 1.4-3.7 3.5-3.7 1 0 2 .2 2 .2v2.2h-1.1c-1.1 0-1.5.7-1.5 1.4v1.7h2.6l-.4 2.9h-2.2v7A10 10 0 0022 12z"/>
          </svg>
          Facebook
        </a>

      </div>

    </div>

  </div>

</body>
</html>
