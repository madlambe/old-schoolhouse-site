<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Old Schoolhouse</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: #231f20;
    }

    .hero {
      height: 100vh;
      background-image: url('hero.jpg');
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .overlay {
      background: rgba(255,255,255,0.9);
      padding: 40px;
      border-radius: 12px;
      text-align: center;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 20px;
    }

    .buttons a {
      display: inline-block;
      margin: 10px;
      padding: 12px 20px;
      background: #23447c;
      color: white;
      text-decoration: none;
      border-radius: 8px;
    }
  </style>
</head>

<body>

  <div class="hero">
    <div class="overlay">
      <h1>The Old Schoolhouse</h1>
      <p>Bookings Opening Soon
      Follow us on Instagram & Facebook for updates</p>

      <div class="buttons">
        <a href="https://www.instagram.com/the_old_schoolhouse_wales" target="_blank">Instagram</a>
        <a href="https://www.facebook.com/theoldschoolhouse1867" target="_blank">Facebook</a>
      </div>
    </div>
  </div>

</body>
</html>
