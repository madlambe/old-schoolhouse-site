<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
  <meta name="googlebot" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
  <meta name="referrer" content="no-referrer">
  <meta name="theme-color" content="#f8f7f3">
  <title>The Old Schoolhouse Guest Guide</title>

  <link rel="stylesheet" href="https://use.typekit.net/kww4lsi.css">
  <link rel="stylesheet" href="/guest-guide-1867/guide-v12.css">
</head>
<body>
  <div class="landing" id="top">
    <header class="hero">
      <img class="brand-logo" src="/guest-guide-1867/assets/logo.png" alt="The Old Schoolhouse">
      <h1>Guest Guide</h1>
      <p id="welcome-line"></p>
    </header>

    <main class="landing-main">
      <details class="greeting-panel">
        <summary>
          <span id="greeting-title" class="greeting-title">A Welcome from Us</span>
          <span class="greeting-cue" aria-hidden="true"></span>
        </summary>
        <div id="greeting-content" class="greeting-content"></div>
      </details>

      <div id="editor-notice" class="editor-notice" hidden>
        <strong>Owner preview:</strong> unfinished items are shown in amber and hidden from guests.
      </div>

      <nav id="guide-menu" class="category-grid" aria-label="Guest guide sections"></nav>
    </main>
  </div>

  <main class="content-main">
    <section id="category-panels" class="category-panels"></section>
  </main>

  <footer>
    <a href="#top">Back to top</a>
    <p>The Old Schoolhouse · Est. 1867</p>
  </footer>

  <script src="/guest-guide-1867/updates-v12.js"></script>
  <script src="/guest-guide-1867/content-v12.js"></script>
  <script>

(() => {
  "use strict";

  const guide = window.GUEST_GUIDE_V12;
  const updates = window.GUEST_UPDATES_V12 || {};
  const owner = new URLSearchParams(window.location.search).get("edit") === "1";

  if (!guide || !guide.site || !Array.isArray(guide.categories)) {
    document.body.insertAdjacentHTML(
      "afterbegin",
      '<p style="padding:20px;background:#fff1d5;color:#925400">' +
      "The Guest Guide content could not be loaded." +
      "</p>"
    );
    return;
  }

  const grid = document.getElementById("guide-menu");
  const panels = document.getElementById("category-panels");
  const welcomeLine = document.getElementById("welcome-line");
  const greetingTitle = document.getElementById("greeting-title");
  const greetingContent = document.getElementById("greeting-content");

  welcomeLine.textContent = guide.site.welcome || "";
  greetingTitle.textContent = guide.site.greetingTitle || "A Welcome from Us";

  if (owner) {
    document.body.classList.add("owner-preview");
    document.getElementById("editor-notice").hidden = false;
  }

  const paths = {
    spark: '<path d="m12 3 1.6 5.3L19 10l-5.4 1.7L12 17l-1.6-5.3L5 10l5.4-1.7L12 3Z"/>',
    home: '<path d="M3 11.5 12 4l9 7.5"/><path d="M5.5 10.5V21h13V10.5"/><path d="M9 21v-6h6v6"/>',
    leaf: '<path d="M20 4C11 4 5 9 5 17c5 0 10-2 13-7"/><path d="M4 21c3-6 7-9 13-12"/>',
    check: '<circle cx="12" cy="12" r="9"/><path d="m8 12 3 3 5-6"/>',
    pin: '<path d="M20 10c0 5-8 11-8 11S4 15 4 10a8 8 0 1 1 16 0Z"/><circle cx="12" cy="10" r="2.5"/>',
    map: '<path d="m3 6 6-3 6 3 6-3v15l-6 3-6-3-6 3V6Z"/><path d="M9 3v15M15 6v15"/>'
  };

  function icon(name) {
    return `<svg viewBox="0 0 24 24" aria-hidden="true">${paths[name] || ""}</svg>`;
  }

  function escapeHTML(value) {
    return String(value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }

  function localISODate() {
    const now = new Date();
    return [
      now.getFullYear(),
      String(now.getMonth() + 1).padStart(2, "0"),
      String(now.getDate()).padStart(2, "0")
    ].join("-");
  }

  function ordinal(number) {
    const mod100 = number % 100;
    if (mod100 >= 11 && mod100 <= 13) return `${number}th`;
    return `${number}${number % 10 === 1 ? "st" : number % 10 === 2 ? "nd" : number % 10 === 3 ? "rd" : "th"}`;
  }

  function displayDate(iso) {
    const date = new Date(`${iso}T12:00:00`);
    if (Number.isNaN(date.getTime())) return iso;
    return `${date.toLocaleDateString("en-GB", { weekday: "long" })} ${ordinal(date.getDate())} ${date.toLocaleDateString("en-GB", { month: "long" })}`;
  }

  function validCollection(row) {
    return (
      row &&
      /^\d{4}-\d{2}-\d{2}$/.test(String(row.date || "")) &&
      Array.isArray(row.collections) &&
      row.collections.some((item) => String(item || "").trim())
    );
  }

  function binSchedule() {
    const bins = updates.bins || {};
    const rows = Array.isArray(bins.collections) ? bins.collections : [];
    const valid = rows.filter(validCollection).sort((a, b) => a.date.localeCompare(b.date));
    const upcoming = valid.filter((row) => row.date >= localISODate());
    const invalid = rows.filter((row) => !validCollection(row));

    if (!upcoming.length && !owner) {
      return '<p class="no-bin-dates">Please check with the property managers for the next collection date.</p>';
    }

    let html = "";

    if (upcoming.length) {
      const next = upcoming[0];
      html += `<section class="next-collection">
        <span class="eyebrow">Next collection</span>
        <h3>${displayDate(next.date)}</h3>
        <ul>${next.collections.map((item) => `<li>${escapeHTML(item)}</li>`).join("")}</ul>
      </section>`;

      html += `<section class="collection-schedule">
        <h3>Upcoming collection dates</h3>
        ${upcoming.map((row) => `<div class="collection-date">
          <strong>${displayDate(row.date)}</strong>
          <ul>${row.collections.map((item) => `<li>${escapeHTML(item)}</li>`).join("")}</ul>
        </div>`).join("")}
      </section>`;
    }

    if (owner) {
      const threshold = Number(bins.warningWhenFewerThan) || 4;
      if (upcoming.length < threshold) {
        html += `<aside class="schedule-warning"><strong>Schedule running low</strong><br>
        Only ${upcoming.length} future collection ${upcoming.length === 1 ? "date remains" : "dates remain"}.
        Add more dates in <code>updates-v12.js</code>.</aside>`;
      }
      if (invalid.length) {
        html += `<aside class="schedule-warning"><strong>${invalid.length} incomplete collection ${invalid.length === 1 ? "entry" : "entries"}</strong></aside>`;
      }
    }

    if (bins.lastUpdated) {
      html += `<p class="last-updated">Last updated: ${escapeHTML(bins.lastUpdated)}</p>`;
    }

    return html;
  }

  function markdown(source, checklist = false) {
    const token = "__BIN_COLLECTION_DATES__";
    let text = escapeHTML(String(source || "").replace("[BIN_COLLECTION_DATES]", token).trim());

    text = text
      .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
      .replace(/_([^_]+)_/g, "<em>$1</em>")
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g, (match, label, url) => {
        const external = /^https?:\/\//i.test(url);
        return `<a href="${url}"${external ? ' target="_blank" rel="noopener noreferrer"' : ""}>${label}</a>`;
      });

    const output = [];
    const lines = text.split(/\n/);
    let inList = false;

    for (const line of lines) {
      if (/^- /.test(line)) {
        if (!inList) {
          output.push(`<ul class="${checklist ? "checklist" : ""}">`);
          inList = true;
        }
        output.push(`<li>${line.slice(2)}</li>`);
        continue;
      }

      if (inList) {
        output.push("</ul>");
        inList = false;
      }

      if (/^### /.test(line)) {
        output.push(`<h3>${line.slice(4)}</h3>`);
      } else if (line.trim() !== "") {
        output.push(`<p>${line.replace(/  $/, "<br>")}</p>`);
      }
    }

    if (inList) output.push("</ul>");

    return output
      .join("")
      .replace(token, binSchedule())
      .replace(/\[TO COMPLETE(?::[^\]]+)?\]/g, (match) => `<mark class="todo">${match}</mark>`);
  }

  greetingContent.innerHTML =
    markdown(guide.site.greeting || "") +
    `<p class="signature">${escapeHTML(guide.site.signature || "")}</p>`;

  for (const category of guide.categories) {
    const visibleItems = category.items.filter((item) => item.complete || owner);

    const card = document.createElement("a");
    card.className = "category-card";
    card.href = `#${category.id}`;
    card.innerHTML = `${icon(category.icon)}<span>${escapeHTML(category.title)}</span>`;
    grid.appendChild(card);

    const panel = document.createElement("section");
    panel.id = category.id;
    panel.className = `category-panel${visibleItems.length ? "" : " empty"}`;
    panel.innerHTML = `
      <div class="category-heading"><h2>${escapeHTML(category.title)}</h2></div>
      <div class="item-list"></div>
      <a class="panel-back-to-top" href="#top">Back to top</a>
    `;

    const list = panel.querySelector(".item-list");

    for (const item of visibleItems) {
      const details = document.createElement("details");
      details.className = `guide-item${item.complete ? "" : " incomplete"}`;
      details.innerHTML = `
        <summary><span>${escapeHTML(item.title)}</span></summary>
        <div class="item-content">${markdown(item.content, item.checklist)}</div>
      `;
      list.appendChild(details);
    }

    panels.appendChild(panel);
  }

  document.addEventListener("click", (event) => {
    const anchor = event.target.closest('a[href^="#"]');
    if (!anchor) return;
    const target = document.querySelector(anchor.getAttribute("href"));
    if (!target) return;
    event.preventDefault();
    target.scrollIntoView({ behavior: "smooth", block: "start" });
  });
})();

  </script>
</body>
</html>
