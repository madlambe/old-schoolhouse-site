    greeting: `A very warm welcome to The Old Schoolhouse, our beautiful 19th century house set in the blissful Monmouthshire countryside.

As you will discover, this is a very special property which we are proud to own.

Originally built in 1867, The Old Schoolhouse was historically at the heart of the local community. Opposite the village church, it was the home of the school master. As the years passed and the school closed, it later became a family home, with a number of extensions and renovations over the years; the most recent extension taking place in 2016.

Given the age and setting of the property, a huge amount of thought has gone into the decoration and furnishings, with the goal of creating an interior which is comfortable and cosy, beautiful and unique, whilst maintaining historical features and offering a higher standard than your usual holiday home.

Without a doubt one of the best features of The Old Schoolhouse is the tranquil large garden, pool area (including pool house) and the surrounding fields. Soak in the crisp, clean country air whilst enjoying the sounds of nature at its best.

Occasionally you may find sheep in the field at the end of the garden. Feel free to pop down and say hello, but please refrain from feeding them.

We sincerely hope you have a truly memorable and enjoyable stay at The Old Schoolhouse. This is our home-away-from-home and we hope you feel very much at home here too. Our only request is that you follow the enclosed House Rules and treat our home as you would your own. Thank you!`,

  <script>
    (async () => {
      "use strict";

      const guide = window.GUEST_GUIDE_V12;
      let updates = window.GUEST_UPDATES_V12 || {};
      const owner =
        new URLSearchParams(window.location.search).get("edit") === "1";

      async function loadAutomaticBinDates() {
        const controller = new AbortController();
        const timeout = window.setTimeout(
          () => controller.abort(),
          6000
        );

        try {
          const response = await fetch("/api/bin-dates", {
            headers: {
              Accept: "application/json"
            },
            signal: controller.signal,
            cache: "no-store"
          });

          if (!response.ok) {
            throw new Error(
              `Bin-date service returned ${response.status}`
            );
          }

          const result = await response.json();

          if (
            result &&
            Array.isArray(result.collections) &&
            result.collections.length
          ) {
            updates = {
              ...updates,
              bins: {
                ...(updates.bins || {}),
                lastUpdated:
                  result.lastUpdated ||
                  new Date().toLocaleDateString("en-GB"),
                collections: result.collections,
                source:
                  result.source ||
                  "Monmouthshire County Council"
              }
            };

            return true;
          }

          return false;
        } catch (error) {
          console.warn(
            "Using saved bin dates because the automatic council " +
            "feed was unavailable.",
            error
          );

          return false;
        } finally {
          window.clearTimeout(timeout);
        }
      }


      if (!guide || !guide.site || !Array.isArray(guide.categories)) {
        document.body.insertAdjacentHTML(
          "afterbegin",
          '<p style="padding:20px;background:#fff1d5;color:#925400">' +
            "The Guest Guide content could not be loaded." +
          "</p>"
        );
        return;
      }

      const grid = document.getElementById("guide-menu");
      const panels = document.getElementById("category-panels");
      const welcomeLine = document.getElementById("welcome-line");
      const greetingTitle = document.getElementById("greeting-title");
      const greetingContent = document.getElementById("greeting-content");

      welcomeLine.textContent = guide.site.welcome || "";
      greetingTitle.textContent =
        guide.site.greetingTitle || "A Welcome from Us";

      if (owner) {
        document.body.classList.add("owner-preview");

        const editorNotice = document.getElementById("editor-notice");
        if (editorNotice) editorNotice.hidden = false;
      }

      const paths = {
        spark:
          '<path d="m12 3 1.6 5.3L19 10l-5.4 1.7L12 17l-1.6-5.3L5 10l5.4-1.7L12 3Z"/>',

        leaf:

          '<path d="m8 12 3 3 5-6"/>',

          '<circle cx="12" cy="10" r="2.5"/>',

        map:
          '<path d="m3 6 6-3 6 3 6-3v15l-6 3-6-3-6 3V6Z"/>' +
          '<path d="M9 3v15M15 6v15"/>',

        shop: '<path d="M4 9h16l-1-5H5L4 9Z"/><path d="M6 9v11h12V9"/><path d="M9 20v-6h6v6"/>',
        basket: '<path d="M4 10h16l-2 10H6L4 10Z"/><path d="m8 10 4-6 4 6"/>',
        fuel: '<path d="M5 21V4h9v17"/><path d="M7 8h5"/><path d="M14 7h3l2 3v8a2 2 0 0 1-4 0v-5"/>',
        cross: '<path d="M9 3h6v6h6v6h-6v6H9v-6H3V9h6V3Z"/>',
        cash: '<rect x="3" y="6" width="18" height="12" rx="2"/><circle cx="12" cy="12" r="3"/><path d="M6 9h.01M18 15h.01"/>',
        mail: '<rect x="3" y="5" width="18" height="14" rx="2"/><path d="m4 7 8 6 8-6"/>',
        bolt: '<path d="m13 2-8 12h7l-1 8 8-12h-7l1-8Z"/>',
        taxi: '<path d="m5 16 1-6h12l1 6"/><path d="M7 10l2-4h6l2 4"/><path d="M4 16h16v4H4z"/><circle cx="7" cy="20" r="1"/><circle cx="17" cy="20" r="1"/>',
        plate: '<circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="4"/><path d="M3 4v7M5 4v7M4 11v9M20 4v16"/>',
        pub: '<path d="M5 3h10l-1 8a5 5 0 0 1-8 0L5 3Z"/><path d="M10 14v6M7 20h6"/><path d="M15 6h3a2 2 0 0 1 0 4h-3"/>',
        family: '<circle cx="8" cy="8" r="2.5"/><circle cx="16" cy="8" r="2.5"/><circle cx="12" cy="13" r="2"/><path d="M3 20c.5-4 2-6 5-6M21 20c-.5-4-2-6-5-6M8 20c.5-3 1.5-5 4-5s3.5 2 4 5"/>',
        cup: '<path d="M4 7h12v7a5 5 0 0 1-5 5H9a5 5 0 0 1-5-5V7Z"/><path d="M16 9h2a3 3 0 0 1 0 6h-2M7 3v2M11 3v2"/>',
        takeaway: '<path d="M7 4h10l-1 17H8L7 4Z"/><path d="M6 8h12M9 12h6"/>',
        produce: '<path d="M12 21V10"/><path d="M12 13c-4 0-7-2-7-6 4 0 7 2 7 6ZM12 16c4 0 7-2 7-6-4 0-7 2-7 6Z"/>',
        castle: '<path d="M4 21V8h4V4h3v4h2V4h3v4h4v13"/><path d="M3 21h18M9 21v-6h6v6"/>',
        boot: '<path d="M6 3v9l-3 3v4h18v-5h-7l-3-3V3H6Z"/><path d="M6 8h5"/>',
        mountain: '<path d="m3 20 6-11 4 6 2-3 6 8H3Z"/><path d="m8 11 2 2 1-2"/>',
        plane: '<path d="m2 16 20-9-7 13-3-6-10 2Z"/><path d="m12 14 4-4"/>',
        bag: '<path d="M5 8h14l-1 13H6L5 8Z"/><path d="M9 8a3 3 0 0 1 6 0"/>',
        rain: '<path d="M6 16h11a4 4 0 0 0 .5-8 6 6 0 0 0-11-1A4.5 4.5 0 0 0 6 16Z"/><path d="m8 19-1 2M12 19l-1 2M16 19l-1 2"/>',
        wine: '<path d="M7 3h10l-1 7a4 4 0 0 1-8 0L7 3Z"/><path d="M12 14v7M9 21h6"/>',
        road: '<path d="M9 22c0-7 6-7 6-13 0-3-1-5-3-7"/><path d="M15 22c0-6-6-7-6-13 0-3 1-5 3-7"/><path d="M12 5v2M12 10v2M12 15v2"/>'
      };

      function icon(name) {
        return (
          '<svg viewBox="0 0 24 24" aria-hidden="true">' +
          (paths[name] || "") +
          "</svg>"
        );
      }

      function escapeHTML(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function localISODate() {
        const now = new Date();

        return [
          now.getFullYear(),
          String(now.getMonth() + 1).padStart(2, "0"),
          String(now.getDate()).padStart(2, "0")
        ].join("-");
      }

      function ordinal(number) {
        const mod100 = number % 100;

        if (mod100 >= 11 && mod100 <= 13) {
          return `${number}th`;
        }

        if (number % 10 === 1) return `${number}st`;
        if (number % 10 === 2) return `${number}nd`;
        if (number % 10 === 3) return `${number}rd`;

        return `${number}th`;
      }

      function putOutDate(iso) {
        const date = new Date(`${iso}T12:00:00`);

        if (Number.isNaN(date.getTime())) {
          return iso;
        }

        date.setDate(date.getDate() - 1);

        const weekday = date.toLocaleDateString("en-GB", {
          weekday: "long"
        });

        const month = date.toLocaleDateString("en-GB", {
          month: "long"
        });

        return `${weekday} ${ordinal(date.getDate())} ${month}`;
      }

      function displayDate(iso) {
        const date = new Date(`${iso}T12:00:00`);

        if (Number.isNaN(date.getTime())) {
          return iso;
        }

        const weekday = date.toLocaleDateString("en-GB", {
          weekday: "long"
        });

        const month = date.toLocaleDateString("en-GB", {
          month: "long"
        });

        return `${weekday} ${ordinal(date.getDate())} ${month}`;
      }

      function validCollection(row) {
        return (
          row &&
          /^\d{4}-\d{2}-\d{2}$/.test(String(row.date || "")) &&
          Array.isArray(row.collections) &&
          row.collections.some((item) => String(item || "").trim())
        );
      }

      function binSchedule() {
        const bins = updates.bins || {};
        const rows = Array.isArray(bins.collections)
          ? bins.collections
          : [];

        const valid = rows
          .filter(validCollection)
          .sort((a, b) => a.date.localeCompare(b.date));

        const upcoming = valid.filter(
          (row) => row.date >= localISODate()
        );

        const invalid = rows.filter(
          (row) => !validCollection(row)
        );

        if (!upcoming.length && !owner) {
          return (
            '<p class="no-bin-dates">' +
              "Please check with the property managers for the next " +
              "collection date." +
            "</p>"
          );
        }

        function collectionList(row) {
          const wasteTypes = [
            {
              match: /general waste|household rubbish|black bin/i,
              title: "⬛ Black bin",
              description:
                "General waste, sealed in plastic refuse bags."
            },
            {
              match: /green box|glass/i,
              title: "🟩 Green recycling box",
              description:
                "Glass only. Please rinse and dry. No plastic refuse bags."
            },
            {
              match: /purple sack|hard plastic|hard plastics|tins/i,
              title: "🟪 Purple recycling sack",
              description:
                "Hard plastics & tins only. No plastic refuse bags."
            },
            {
              match: /red sack|paper|cardboard/i,
              title: "🟥 Red recycling sack",
              description:
                "Paper & cardboard only. No plastic refuse bags."
            },
            {
              match: /food waste|blue bin|food-compost/i,
              title: "🟦 Blue food-compost bin",
              description:
                "Food waste only, sealed in plastic food-compost bags."
            }
          ];

          const displayed = [];

          for (const item of row.collections) {
            const value = String(item || "");
            const type = wasteTypes.find(
              (entry) => entry.match.test(value)
            );

            if (!type) continue;

            if (
              displayed.some(
                (entry) => entry.title === type.title
              )
            ) {
              continue;
            }

            displayed.push(type);
          }

          return `
            <ul class="bin-type-list">
              ${displayed
                .map(
                  (type) => `
                    <li>
                      <strong>${escapeHTML(type.title)}</strong>
                      <span>${escapeHTML(type.description)}</span>
                    </li>
                  `
                )
                .join("")}
            </ul>
          `;
        }

        function collectionBlock(row, isNext = false) {
          return `
            <section class="${
              isNext ? "next-collection" : "collection-date"
            }">
              ${isNext
                ? '<span class="eyebrow">Next Collection</span>'
                : ""}
              <h3>${displayDate(row.date)}</h3>
              <p class="put-out-date">
                <strong>Put out:</strong>
                ${putOutDate(row.date)} (evening)
              </p>
              ${collectionList(row)}
            </section>
          `;
        }

        let html = "";

        if (upcoming.length) {
          html += collectionBlock(upcoming[0], true);

          if (upcoming.length > 1) {
            html += `
              <section class="collection-schedule">
                <h3>Future Collection Dates</h3>
                ${upcoming
                  .slice(1)
                  .map((row) => collectionBlock(row, false))
                  .join("")}
              </section>
            `;
          }
        }

        if (owner) {
          const threshold =
            Number(bins.warningWhenFewerThan) || 4;

          if (upcoming.length < threshold) {
            html += `
              <aside class="schedule-warning">
                <strong>Schedule running low</strong><br>
                Only ${upcoming.length} future collection
                ${upcoming.length === 1
                  ? " date remains"
                  : " dates remain"}.
                Add more dates to the embedded
                <code>GUEST_UPDATES_V12</code> schedule.
              </aside>
            `;
          }

          if (invalid.length) {
            html += `
              <aside class="schedule-warning">
                <strong>
                  ${invalid.length} incomplete collection
                  ${invalid.length === 1
                    ? " entry"
                    : " entries"}
                </strong>
              </aside>
            `;
          }
        }

        if (bins.source) {
          html += `
            <p class="bin-update-status">
              <span class="bin-updated-badge">
                Updated today
              </span>
            </p>
          `;
        }

        return html;
      }

      function markdown(source, checklist = false) {
        const token = "BINCOLLECTIONDATESPLACEHOLDER";

        let text = escapeHTML(
          String(source || "")
            .replace("[BIN_COLLECTION_DATES]", token)
            .trim()
        );

        text = text
          .replace(
            /\*\*(.+?)\*\*/g,
            "<strong>$1</strong>"
          )
          .replace(
            /_([^_]+)_/g,
            "<em>$1</em>"
          )
          .replace(
            /\[([^\]]+)\]\(([^)]+)\)/g,
            (match, label, url) => {
              const external =
                /^https?:\/\//i.test(url);

              return (
                `<a href="${url}"` +
                (
                  external
                    ? ' target="_blank" rel="noopener noreferrer"'
                    : ""
                ) +
                `>${label}</a>`
              );
            }
          );

        const output = [];
        const lines = text.split(/\n/);
        let inList = false;

        for (const line of lines) {
          if (line.trim() === token) {
            if (inList) {
              output.push("</ul>");
              inList = false;
            }

            output.push(binSchedule());
            continue;
          }

          if (/^- /.test(line)) {
            if (!inList) {
              output.push(
                `<ul class="${
                  checklist ? "checklist" : ""
                }">`
              );

              inList = true;
            }

            output.push(
              `<li>${line.slice(2)}</li>`
            );

            continue;
          }

          if (inList) {
            output.push("</ul>");
            inList = false;
          }

          if (/^### /.test(line)) {
            output.push(
              `<h3>${line.slice(4)}</h3>`
            );
          } else if (line.trim() !== "") {
            output.push(
              `<p>${line.replace(/  $/, "<br>")}</p>`
            );
          }
        }

        if (inList) {
          output.push("</ul>");
        }

        return output
          .join("")
          .replace(
            /\[TO COMPLETE(?::[^\]]+)?\]/g,
            (match) =>
              `<mark class="todo">${match}</mark>`
          );
      }

      greetingContent.innerHTML =
        markdown(guide.site.greeting || "") +
        `<p class="signature">${
          escapeHTML(guide.site.signature || "")
        }</p>`;

      for (const category of guide.categories) {
        const visibleItems =
          category.items.filter(
            (item) => item.complete || owner
          );

        const card =
          document.createElement("a");

        card.className = "category-card";
        card.href = `#${category.id}`;

        card.innerHTML =
          `${icon(category.icon)}` +
          `<span>${escapeHTML(category.title)}</span>`;

        grid.appendChild(card);

        const panel =
          document.createElement("section");

        panel.id = category.id;

        panel.className =
          `category-panel${
            visibleItems.length ? "" : " empty"
          }`;

        panel.innerHTML = `
          <div class="category-heading">
            <h2>${escapeHTML(category.title)}</h2>
          </div>

          <div class="item-list"></div>

          <a
            class="panel-back-to-top"
            href="#top"
          >
            Back to top
          </a>
        `;

        const list =
          panel.querySelector(".item-list");

        for (const item of visibleItems) {
          const details =
            document.createElement("details");

          details.className =
            `guide-item${
              item.complete ? "" : " incomplete"
            }`;

          details.dataset.itemId = item.id;

          details.innerHTML = `
            <summary>
              ${item.icon ? `<span class="item-icon">${icon(item.icon)}</span>` : ""}
              <span>${escapeHTML(item.title)}</span>
            </summary>

            <div class="item-content">
              ${markdown(
                item.content,
                item.checklist
              )}
            </div>
          `;

          list.appendChild(details);
        }

        panels.appendChild(panel);
      }


      function refreshWasteCollectionDisplay() {
        const wasteItem = guide.categories
          .flatMap((category) => category.items)
          .find((item) => item.id === "waste");

        const wasteContent = document.querySelector(
          '[data-item-id="waste"] .item-content'
        );

        if (!wasteItem || !wasteContent) {
          return;
        }

        wasteContent.innerHTML = markdown(
          wasteItem.content,
          wasteItem.checklist
        );
      }

      // Rendered content and all six cards are already visible at this
      // point. Live council dates now load quietly in the background.
      loadAutomaticBinDates().then((updated) => {
        if (updated) {
          refreshWasteCollectionDisplay();
        }
      });

      document.addEventListener(
        "click",
        (event) => {
          const anchor =
            event.target.closest(
              'a[href^="#"]'
            );

          if (!anchor) return;

          const target =
            document.querySelector(
              anchor.getAttribute("href")
            );

          if (!target) return;

          event.preventDefault();

          target.scrollIntoView({
            behavior: "smooth",
            block: "start"
          });
        }
      );
    })();
  </script>
</body>
</html>
